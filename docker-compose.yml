# waizor-v2 — production stack
#
# The app runs as a single container. Nginx + Certbot live on the HOST
# and reverse-proxy https://v2.waizor.com.br → 127.0.0.1:3000.
#
# A single `.env` file (created only on the server from
# .env.production.example, never committed) supplies BOTH:
#   - build args: Compose auto-loads `.env` and interpolates the
#     NEXT_PUBLIC_* values below (interpolation only reads `.env`, not
#     env_file — that is why one `.env` is used for everything).
#   - runtime env: SUPABASE_SERVICE_ROLE_KEY, ENCRYPTION_KEY, META_*, etc.
#     (loaded via env_file into the running container).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_APP_LOCALE: ${NEXT_PUBLIC_APP_LOCALE}
    image: waizor-v2:latest
    container_name: waizor-v2
    env_file: .env
    # Bind to loopback only — nginx on the host is the public entrypoint.
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
