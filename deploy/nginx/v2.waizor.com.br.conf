# waizor-v2 — Nginx reverse proxy for v2.waizor.com.br
#
# Install on the VPS:
#   sudo cp deploy/nginx/v2.waizor.com.br.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/v2.waizor.com.br.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue the certificate (Certbot rewrites this file to add the TLS
# server block + an HTTP→HTTPS redirect automatically):
#   sudo certbot --nginx -d v2.waizor.com.br

server {
    listen 80;
    listen [::]:80;
    server_name v2.waizor.com.br;

    # Allow large uploads (WhatsApp media, avatars).
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket / SSE upgrade support.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward the real host/scheme so the app derives correct origins.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_read_timeout 300s;
        proxy_cache_bypass $http_upgrade;
    }
}
